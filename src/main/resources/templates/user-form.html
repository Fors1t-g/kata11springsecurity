<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title th:text="${user.id} != null ? 'Редактировать пользователя' : 'Создать пользователя'">Форма пользователя</title>
    <style>
        form{max-width:480px}label{display:block;margin:10px 0 4px}input{width:100%;padding:8px}
        .row{display:flex;gap:12px}.row > div{flex:1}
    </style>
</head>
<body>

<h1 th:text="${user.id} != null ? 'Редактировать пользователя' : 'Создать пользователя'"></h1>

<form th:action="@{/admin/users/save}" method="post">
    <input type="hidden" name="id" th:value="${user.id}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <label for="username">Логин</label>
    <input id="username" name="username" type="text" required th:value="${user.username}">

    <label for="password">Пароль</label>
    <input id="password" name="password" type="password" th:placeholder="${user.id} != null ? 'Оставьте пустым — без изменений' : ''">

    <div class="row">
        <div>
            <label for="name">Имя</label>
            <input id="name" name="name" type="text" required th:value="${user.name}">
        </div>
        <div>
            <label for="age">Возраст</label>
            <input id="age" name="age" type="number" min="0" th:value="${user.age}">
        </div>
    </div>

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required th:value="${user.email}">

    <div style="margin-top:14px;">
        <button type="submit">Сохранить</button>
        <a th:href="@{/admin/users}" style="margin-left:8px;">Отмена</a>
    </div>
</form>

<form th:action="@{/logout}" method="post" style="margin-top:20px;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Выйти</button>
</form>

</body>
</html>
